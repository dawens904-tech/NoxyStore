<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>NoxyStore - Gaming Top-Up Marketplace</title>

    <meta
      name="description"
      content="NoxyStore is a trusted gaming top-up marketplace. Buy game currency, diamonds, gems, UC and credits instantly for Genshin Impact, PUBG, Free Fire, Mobile Legends and more."
    />

    <meta
      name="keywords"
      content="NoxyStore, game top up, gaming currency, diamonds, gems, coins, Genshin Impact top up, PUBG UC, Free Fire diamonds, Mobile Legends diamonds"
    />

    <meta name="author" content="NoxyStore" />

    <meta name="robots" content="index, follow" />

    <meta name="theme-color" content="#000000" />


    <!-- Apple / Safari -->
    <meta name="apple-mobile-web-app-title" content="NoxyStore" />
    <meta name="apple-mobile-web-app-capable" content="yes" />


    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <meta property="og:url" content="https://www.noxystore.com/" />

    <meta
      property="og:title"
      content="NoxyStore - Instant Game Top Up Store"
    />

    <meta
      property="og:description"
      content="Fast, safe and affordable game top-ups for your favorite games."
    />

    <meta
      property="og:image"
      content="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1200&h=630&fit=crop"
    />

    <meta property="og:site_name" content="NoxyStore" />


    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="NoxyStore - Gaming Top-Up Marketplace"
    />

    <meta
      name="twitter:description"
      content="Recharge your favorite games instantly with NoxyStore."
    />

    <meta
      name="twitter:image"
      content="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1200&h=630&fit=crop"
    />


    <!-- Website Schema -->
    <script type="application/ld+json">
    {
      "@context":"https://schema.org",
      "@type":"WebSite",
      "name":"NoxyStore",
      "url":"https://www.noxystore.com/",
      "description":"Gaming top-up marketplace for game currencies.",
      "potentialAction":{
        "@type":"SearchAction",
        "target":"https://www.noxystore.com/search?q={search_term_string}",
        "query-input":"required name=search_term_string"
      }
    }
    </script>


    <!-- Organization Schema -->
    <script type="application/ld+json">
    {
      "@context":"https://schema.org",
      "@type":"Organization",
      "name":"NoxyStore",
      "url":"https://www.noxystore.com/",
      "logo":"https://www.noxystore.com/favicon.svg"
    }
    </script>


    <!-- Trustpilot -->
    <script 
      type="text/javascript" 
      src="//widget.trustpilot.com/bootstrap/v5/tp.widget.bootstrap.min.js" 
      async>
    </script>


    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Rajdhani:wght@600;700&display=swap"
      rel="stylesheet"
    />


    <link rel="canonical" href="https://www.noxystore.com/" />

  </head>


  <body>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

  </body>

</html>
